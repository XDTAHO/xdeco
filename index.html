<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>專案照片上傳系統</title>
  <!-- 引入 Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 自訂過場動畫與 Spinner -->
  <style>
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top: 3px solid #fff;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 flex flex-col items-center py-10">

  <!-- 主要上傳表單區塊 -->
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden fade-in">
    <!-- Header -->
    <div class="bg-blue-600 p-6 text-white text-center">
      <h1 class="text-2xl font-bold">照片上傳系統</h1>
      <p class="text-blue-100 text-sm mt-1 text-opacity-80">安全、快速地將照片同步至雲端</p>
    </div>

    <!-- Form -->
    <form id="uploadForm" class="p-6 space-y-6">
      
      <!-- 選擇上傳分類 -->
      <div class="space-y-3">
        <label class="block text-sm font-medium text-gray-700">選擇上傳至</label>
        <div class="flex flex-wrap gap-4">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="uploadType" value="batch" checked class="w-4 h-4 text-blue-600 focus:ring-blue-500">
            <span class="text-gray-800">指定梯次</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="uploadType" value="today" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
            <span class="text-gray-800">今日日期</span>
          </label>
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="radio" name="uploadType" value="other_date" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
            <span class="text-gray-800">其他日期</span>
          </label>
        </div>
      </div>

      <!-- 梯次按鈕選單 (動態顯示/隱藏) -->
      <div id="batchSelectContainer" class="space-y-2">
        <label class="block text-sm font-medium text-gray-700">選擇梯次</label>
        <div id="batchButtons" class="grid grid-cols-2 gap-2">
          <p class="text-sm text-gray-500 col-span-2">載入梯次中...</p>
        </div>
        <p id="batchErrorMsg" class="text-xs text-red-500 hidden">無法載入梯次，請稍後再試。</p>
      </div>

      <!-- 其他日期選擇 (動態顯示/隱藏) -->
      <div id="otherDateContainer" class="space-y-2 hidden">
        <label for="customDate" class="block text-sm font-medium text-gray-700">選擇日期</label>
        <input type="date" id="customDate" class="mt-1 block w-full px-3 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md border shadow-sm transition-colors">
      </div>

      <!-- 檔案選擇區 -->
      <div class="space-y-2">
        <label class="block text-sm font-medium text-gray-700">選擇照片</label>
        <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-md hover:border-blue-400 transition-colors cursor-pointer bg-gray-50 hover:bg-blue-50" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <div class="space-y-1 text-center">
            <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
              <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            <div class="flex text-sm text-gray-600 justify-center">
              <span class="relative cursor-pointer rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none">
                <span>點擊選擇照片</span>
                <!-- 開放多選 -->
                <input id="fileInput" name="file" type="file" accept="image/*" multiple class="sr-only" required>
              </span>
            </div>
            <p class="text-xs text-gray-500" id="fileChosenText">支援 JPG, PNG 等圖片格式 (可多選)</p>
          </div>
        </div>
      </div>

      <!-- 狀態訊息 -->
      <div id="statusMessage" class="hidden rounded-md p-4 text-sm font-medium"></div>

      <!-- 提交按鈕 -->
      <button type="submit" id="submitBtn" class="w-full flex justify-center items-center gap-2 py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors disabled:opacity-70 disabled:cursor-not-allowed">
        <span id="submitText">開始上傳</span>
        <div id="submitSpinner" class="spinner hidden"></div>
      </button>

    </form>
  </div>

  <!-- [新增] 上傳成功後的縮圖預覽區塊 -->
  <div id="uploadedGallery" class="max-w-md w-full mt-6 bg-white rounded-2xl shadow-lg p-6 fade-in hidden">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-gray-800">已上傳照片</h2>
      <span class="text-xs font-medium bg-green-100 text-green-700 px-2 py-1 rounded-full">成功</span>
    </div>
    <!-- 縮圖將會動態插入至此網格中 -->
    <div id="uploadedGrid" class="grid grid-cols-3 sm:grid-cols-4 gap-3">
    </div>
  </div>

  <script>
    // ==========================================
    // 系統設定
    // ==========================================
    // 你的 GAS 部署網址 (請確認這是你最新版部署的 /exec 網址)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyjg0rD9zTE9FlEs2iBhOGNnOaP0DSGd-XbKNBMzvzD4sm_tvT4xgS4-EqU04JlAtMi/exec";

    // DOM 元素快取
    const elements = {
      form: document.getElementById('uploadForm'),
      uploadTypeRadios: document.querySelectorAll('input[name="uploadType"]'),
      batchSelectContainer: document.getElementById('batchSelectContainer'),
      batchButtons: document.getElementById('batchButtons'),
      batchErrorMsg: document.getElementById('batchErrorMsg'),
      otherDateContainer: document.getElementById('otherDateContainer'),
      customDate: document.getElementById('customDate'),
      fileInput: document.getElementById('fileInput'),
      fileChosenText: document.getElementById('fileChosenText'),
      submitBtn: document.getElementById('submitBtn'),
      submitText: document.getElementById('submitText'),
      submitSpinner: document.getElementById('submitSpinner'),
      statusMessage: document.getElementById('statusMessage'),
      
      // 新增縮圖區塊元素
      uploadedGallery: document.getElementById('uploadedGallery'),
      uploadedGrid: document.getElementById('uploadedGrid')
    };

    let selectedBatch = { folderId: null, name: null };

    // ==========================================
    // 初始化與事件綁定
    // ==========================================
    document.addEventListener('DOMContentLoaded', () => {
      fetchBatches(); 

      // 監聽上傳類型切換
      elements.uploadTypeRadios.forEach(radio => {
        radio.addEventListener('change', (e) => {
          const val = e.target.value;
          elements.batchSelectContainer.style.display = (val === 'batch') ? 'block' : 'none';
          elements.otherDateContainer.style.display = (val === 'other_date') ? 'block' : 'none';
          elements.customDate.required = (val === 'other_date');
        });
      });

      // 監聽檔案選擇，更新介面文字與重置預覽區
      elements.fileInput.addEventListener('change', (e) => {
        const files = e.target.files;
        if (files.length > 0) {
          let totalSize = 0;
          for (let i = 0; i < files.length; i++) {
            totalSize += files[i].size;
          }
          elements.fileChosenText.textContent = `已選擇: ${files.length} 張照片 (共 ${(totalSize / (1024 * 1024)).toFixed(2)} MB)`;
          elements.fileChosenText.classList.add('text-blue-600', 'font-medium');
        } else {
          elements.fileChosenText.textContent = '支援 JPG, PNG 等圖片格式 (可多選)';
          elements.fileChosenText.classList.remove('text-blue-600', 'font-medium');
        }
      });

      elements.form.addEventListener('submit', handleUpload);
    });

    // ==========================================
    // 核心邏輯 (API 溝通)
    // ==========================================

    async function fetchBatches() {
      try {
        const response = await fetch(`${GAS_URL}?action=getBatches`);
        const result = await response.json();

        if (result.status === 'success' && result.data) {
          elements.batchButtons.innerHTML = ''; 
          
          if (result.data.length === 0) {
            elements.batchButtons.innerHTML = '<p class="text-sm text-gray-500 col-span-2">目前無可用梯次</p>';
            return;
          }
          
          result.data.forEach(batch => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'py-2 px-3 border border-gray-300 rounded-md text-sm font-medium bg-white text-gray-700 hover:bg-gray-50 focus:outline-none transition-colors';
            btn.textContent = batch.name;
            
            btn.onclick = () => {
              selectedBatch = { folderId: batch.folderId || '', name: batch.name };
              Array.from(elements.batchButtons.children).forEach(b => {
                b.classList.remove('border-blue-500', 'bg-blue-50', 'text-blue-700');
                b.classList.add('border-gray-300', 'bg-white', 'text-gray-700');
              });
              btn.classList.remove('border-gray-300', 'bg-white', 'text-gray-700');
              btn.classList.add('border-blue-500', 'bg-blue-50', 'text-blue-700');
            };
            
            elements.batchButtons.appendChild(btn);
          });
        } else {
          throw new Error('回傳格式錯誤');
        }
      } catch (error) {
        console.error("Fetch batches error:", error);
        elements.batchButtons.innerHTML = '';
        elements.batchErrorMsg.classList.remove('hidden');
      }
    }

    async function handleUpload(e) {
      e.preventDefault();

      const files = elements.fileInput.files;
      if (files.length === 0) {
        showStatus('error', '請先選擇要上傳的照片。');
        return;
      }

      const uploadType = document.querySelector('input[name="uploadType"]:checked').value;
      
      if (uploadType === 'batch' && !selectedBatch.name) {
        showStatus('error', '請選擇一個梯次。');
        return;
      }
      if (uploadType === 'other_date' && !elements.customDate.value) {
        showStatus('error', '請選擇日期。');
        return;
      }

      setLoadingState(true, `準備上傳 (0/${files.length})...`);
      showStatus('', ''); 
      
      // [新增] 每次新上傳開始時，清空縮圖區，並將其顯示出來
      elements.uploadedGrid.innerHTML = '';
      elements.uploadedGallery.classList.remove('hidden');

      let successCount = 0;

      try {
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          setLoadingState(true, `上傳中... (${i + 1}/${files.length})`);
          
          const base64Data = await fileToBase64(file);
          
          const payload = {
            fileBase64: base64Data,
            fileName: file.name,
            mimeType: file.type,
            uploadType: uploadType === 'today' ? 'date' : uploadType,
            batchFolderId: uploadType === 'batch' ? selectedBatch.folderId : null,
            batchName: uploadType === 'batch' ? selectedBatch.name : null,
            customDate: uploadType === 'other_date' ? elements.customDate.value : null
          };

          const response = await fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });

          const result = await response.json();

          if (result.status === 'success') {
            successCount++;
            
            // [新增] 照片成功上傳後，立刻產生本地縮圖並加入畫面
            renderThumbnail(file);
            
          } else {
            throw new Error(result.message || `檔案 ${file.name} 上傳發生未知的錯誤`);
          }
        }

        showStatus('success', `成功上傳 ${successCount} 張照片！`);
        elements.form.reset(); 
        selectedBatch = { folderId: null, name: null }; 
        if (elements.batchButtons) {
          Array.from(elements.batchButtons.children).forEach(b => {
            b.classList.remove('border-blue-500', 'bg-blue-50', 'text-blue-700');
            b.classList.add('border-gray-300', 'bg-white', 'text-gray-700');
          });
        }
        elements.fileChosenText.textContent = '支援 JPG, PNG 等圖片格式 (可多選)';
        elements.fileChosenText.classList.remove('text-blue-600', 'font-medium');

      } catch (error) {
        console.error("Upload error:", error);
        showStatus('error', `上傳中斷：${error.message} (已成功上傳: ${successCount} 張)`);
      } finally {
        setLoadingState(false, '開始上傳');
      }
    }

    // ==========================================
    // 輔助函式 (Helpers)
    // ==========================================

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => {
          const base64String = reader.result.split(',')[1];
          resolve(base64String);
        };
        reader.onerror = error => reject(error);
      });
    }

    function setLoadingState(isLoading, text = '開始上傳') {
      elements.submitBtn.disabled = isLoading;
      if (isLoading) {
        elements.submitText.textContent = text;
        elements.submitSpinner.classList.remove('hidden');
      } else {
        elements.submitText.textContent = text;
        elements.submitSpinner.classList.add('hidden');
      }
    }

    function showStatus(type, message) {
      const el = elements.statusMessage;
      el.textContent = message;
      el.classList.remove('hidden', 'bg-green-100', 'text-green-800', 'bg-red-100', 'text-red-800');
      
      if (type === 'success') {
        el.classList.add('bg-green-100', 'text-green-800');
      } else if (type === 'error') {
        el.classList.add('bg-red-100', 'text-red-800');
      } else {
        el.classList.add('hidden');
      }
    }

    // [新增] 渲染本地縮圖的功能
    function renderThumbnail(file) {
      // 使用瀏覽器原生的 createObjectURL 建立暫時的本地圖片連結 (0 網路延遲)
      const imageUrl = URL.createObjectURL(file);
      
      // 建立縮圖 DOM 結構
      const imgWrapper = document.createElement('div');
      imgWrapper.className = 'relative aspect-square w-full overflow-hidden rounded-lg border border-gray-200 shadow-sm fade-in group';
      
      const img = document.createElement('img');
      img.src = imageUrl;
      img.className = 'object-cover w-full h-full transform transition-transform duration-300 group-hover:scale-110';
      
      // 建立成功打勾的小標籤 (裝飾用)
      const successBadge = document.createElement('div');
      successBadge.className = 'absolute bottom-1 right-1 bg-green-500 text-white rounded-full p-0.5 shadow-md';
      successBadge.innerHTML = `<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;

      imgWrapper.appendChild(img);
      imgWrapper.appendChild(successBadge);
      
      // 將縮圖加入網格
      elements.uploadedGrid.appendChild(imgWrapper);
    }
  </script>
</body>
</html>
